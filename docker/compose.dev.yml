name: bytebucket
services:
  bytebucket:
    build:
      context: ..          # Set context to the project root
      dockerfile: docker/Dockerfile.dev
    ports:
      - "9000:9000"  # for storage api
      - "9001:9001"  # for admin api
    environment:
      - ENCRYPTION_KEY=zcY9EnJ5gVVDyfrNlXsuEOToLwC7cWsiz02xGKbBo1g=
      - ACCESS_KEY_ID=APE6at7CMFvJaEJjnmbC
      - SECRET_ACCESS_KEY=40ylGQ3lRaxE/SQFRZrHZY+e+XD7CBMVa8ioUsAO
    volumes:
      - ..:/app       # Mount the entire project root into /app for live reloading
      - ../data:/data
    develop:
      watch:
        - action: sync
          path: ..              # Watch the project root
          target: /app
          ignore:
            - data/
            - vendor/
        - action: rebuild
          path: go.mod